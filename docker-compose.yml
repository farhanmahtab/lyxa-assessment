version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: lyxa-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=secret
    volumes:
      - mongodb_data:/data/db
    networks:
      - lyxa-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: lyxa-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - lyxa-network

networks:
  lyxa-network:
    driver: bridge

volumes:
  mongodb_data:
