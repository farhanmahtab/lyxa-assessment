version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: lyxa-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=secret
    volumes:
      - mongodb_data:/data/db
    networks:
      - lyxa-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: lyxa-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - lyxa-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:3002
      - PORT=3000
    depends_on:
      - auth-service
      - product-service
    networks:
      - lyxa-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      - MONGODB_URI=mongodb://admin:secret@mongodb:27017/lyxa_auth?authSource=admin
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - JWT_SECRET=supersecret
      - PORT=3001
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - lyxa-network

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    environment:
      - MONGODB_URI=mongodb://admin:secret@mongodb:27017/lyxa_products?authSource=admin
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - PORT=3002
    depends_on:
      - mongodb
      - rabbitmq
      - auth-service
    networks:
      - lyxa-network

networks:
  lyxa-network:
    driver: bridge

volumes:
  mongodb_data:
